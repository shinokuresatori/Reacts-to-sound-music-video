
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#mv-container { width: 100%; background: #000; border-radius: 8px; overflow: hidden; position: relative; }
canvas#mv { display: block; width: 100%; }
#controls {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; background: #111;
  border-top: 0.5px solid #333; flex-wrap: wrap;
}
#progress-bar { width: 100%; height: 3px; background: #222; cursor: pointer; border-radius: 2px; order: -1; flex-basis: 100%; }
#progress-fill { height: 100%; background: #fff; border-radius: 2px; width: 0%; pointer-events: none; }
.ctrl-btn {
  background: transparent; border: 0.5px solid #555; color: #ccc;
  font-size: 12px; padding: 6px 12px; border-radius: 6px; cursor: pointer; white-space: nowrap;
}
.ctrl-btn:hover { background: #222; border-color: #aaa; }
.ctrl-btn:disabled { opacity: 0.35; cursor: default; }
#play-btn { width: 32px; height: 32px; border-radius: 50%; font-size: 13px; padding: 0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#rec-btn { border-color: #555; }
#rec-btn.recording { border-color: #e55; color: #f88; animation: blink 1s infinite; }
#rec-btn.recording:hover { background: #1a0000; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
#track-name { font-size: 12px; color: #777; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
#rec-status { font-size: 11px; color: #666; white-space: nowrap; }
#no-audio-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #444; font-size: 13px; text-align: center; pointer-events: none; }
</style>

<div id="mv-container">
  <canvas id="mv"></canvas>
  <div id="no-audio-msg">WAV / MP3 / OGG ファイルを読み込んでください</div>
</div>
<div id="controls">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <button class="ctrl-btn" id="upload-btn">ファイルを開く</button>
  <input type="file" id="file-input" accept="audio/*" style="display:none">
  <button class="ctrl-btn" id="play-btn" disabled>▶</button>
  <button class="ctrl-btn" id="rec-btn" disabled>⏺ 録画</button>
  <span id="rec-status"></span>
  <span id="track-name">—</span>
</div>

<script>
const canvas = document.getElementById('mv');
const ctx = canvas.getContext('2d');
const uploadBtn = document.getElementById('upload-btn');
const fileInput = document.getElementById('file-input');
const playBtn = document.getElementById('play-btn');
const recBtn = document.getElementById('rec-btn');
const recStatus = document.getElementById('rec-status');
const trackName = document.getElementById('track-name');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const noAudioMsg = document.getElementById('no-audio-msg');

const W = 800, H = 450;
canvas.width = W; canvas.height = H;

let audioCtx, analyser, source, audioBuffer, mediaStreamDest;
let isPlaying = false, startTime = 0, pauseOffset = 0;
let mediaRecorder = null, recordedChunks = [], isRecording = false;
let recInterval = null, recSeconds = 0;
let currentFileName = 'mv';

let beat = 0, beatSmooth = 0, bassLevel = 0, midLevel = 0, hiLevel = 0, time = 0;

const PARTICLE_COUNT = 180;
const particles = Array.from({length: PARTICLE_COUNT}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  vx: (Math.random()-.5)*.4, vy: (Math.random()-.5)*.4,
  size: .8+Math.random()*2.2, phase: Math.random()*Math.PI*2, depth: .3+Math.random()*.7
}));

const FLOAT_SHAPES = 8;
const floatShapes = Array.from({length: FLOAT_SHAPES}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  vx: (Math.random()-.5)*.25, vy: (Math.random()-.5)*.25,
  sides: 3+Math.floor(Math.random()*4), r: 18+Math.random()*28,
  rot: Math.random()*Math.PI*2, rotSpeed: (Math.random()-.5)*.012,
  depth: .3+Math.random()*.7
}));

const GRID_COLS = 10, GRID_ROWS = 7;

function setupAudio(buffer) {
  if (audioCtx) audioCtx.close();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.82;
  mediaStreamDest = audioCtx.createMediaStreamDestination();
  analyser.connect(audioCtx.destination);
  analyser.connect(mediaStreamDest);
  audioBuffer = buffer;
}

function playFrom(offset) {
  if (!audioCtx || !audioBuffer) return;
  if (source) { try { source.stop(); } catch(e){} }
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  source.start(0, offset);
  startTime = audioCtx.currentTime - offset;
  source.onended = () => {
    if (isPlaying) {
      isPlaying = false; playBtn.textContent = '▶'; pauseOffset = 0;
      if (isRecording) stopRecording();
    }
  };
}

uploadBtn.onclick = () => fileInput.click();
fileInput.onchange = async (e) => {
  const file = e.target.files[0]; if (!file) return;
  const arr = await file.arrayBuffer();
  const tmp = new (window.AudioContext || window.webkitAudioContext)();
  const buf = await tmp.decodeAudioData(arr); tmp.close();
  setupAudio(buf);
  currentFileName = file.name.replace(/\.[^.]+$/, '');
  trackName.textContent = currentFileName;
  noAudioMsg.style.display = 'none';
  playBtn.disabled = false; recBtn.disabled = false;
  isPlaying = false; pauseOffset = 0; playBtn.textContent = '▶';
  stopRecording();
};

playBtn.onclick = () => {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!isPlaying) { playFrom(pauseOffset); isPlaying = true; playBtn.textContent = '⏸'; }
  else { pauseOffset = audioCtx.currentTime - startTime; source.stop(); isPlaying = false; playBtn.textContent = '▶'; }
};

progressBar.onclick = (e) => {
  if (!audioBuffer) return;
  const rect = progressBar.getBoundingClientRect();
  const seek = (e.clientX - rect.left) / rect.width * audioBuffer.duration;
  pauseOffset = seek;
  if (isPlaying) playFrom(seek);
};

// --- Recording ---
function startRecording() {
  if (!audioCtx || !mediaStreamDest) return;
  const canvasStream = canvas.captureStream(60);
  const audioTracks = mediaStreamDest.stream.getAudioTracks();
  audioTracks.forEach(t => canvasStream.addTrack(t));

  const mimeTypes = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
  const mimeType = mimeTypes.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';

  recordedChunks = [];
  mediaRecorder = new MediaRecorder(canvasStream, { mimeType, videoBitsPerSecond: 8000000 });
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = saveRecording;
  mediaRecorder.start(100);
  isRecording = true;
  recBtn.textContent = '⏹ 停止・保存';
  recBtn.classList.add('recording');
  recSeconds = 0;
  recInterval = setInterval(() => {
    recSeconds++;
    const m = String(Math.floor(recSeconds/60)).padStart(2,'0');
    const s = String(recSeconds%60).padStart(2,'0');
    recStatus.textContent = '● REC ' + m + ':' + s;
  }, 1000);
  recStatus.textContent = '● REC 00:00';
}

function stopRecording() {
  if (!isRecording) return;
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  recBtn.textContent = '⏺ 録画';
  recBtn.classList.remove('recording');
  clearInterval(recInterval);
  recStatus.textContent = '保存中...';
}

function saveRecording() {
  if (recordedChunks.length === 0) { recStatus.textContent = ''; return; }
  const blob = new Blob(recordedChunks, { type: 'video/webm' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = currentFileName + '_mv.webm';
  a.click();
  URL.revokeObjectURL(url);
  recStatus.textContent = '保存完了';
  setTimeout(() => { recStatus.textContent = ''; }, 3000);
}

recBtn.onclick = () => {
  if (!isRecording) {
    if (!isPlaying) { playFrom(pauseOffset); isPlaying = true; playBtn.textContent = '⏸'; }
    startRecording();
  } else {
    stopRecording();
  }
};

// --- Draw ---
const freqData = new Uint8Array(1024);
const timeData = new Uint8Array(2048);
function getEnergy(s, e) { let sum=0; for(let i=s;i<e;i++) sum+=freqData[i]; return sum/((e-s)*255); }
function poly(cx,cy,sides,r,rot) {
  ctx.beginPath();
  for(let i=0;i<=sides;i++){const a=(i/sides)*Math.PI*2+rot; i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}
  ctx.closePath();
}

function drawFrame() {
  requestAnimationFrame(drawFrame);
  time += 0.016;
  if (analyser) {
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);
    bassLevel = getEnergy(0,5); midLevel = getEnergy(5,30); hiLevel = getEnergy(30,100);
    beat = bassLevel; beatSmooth = beatSmooth*.88 + beat*.12;
  }

  ctx.fillStyle = `rgba(0,0,0,${0.14+beatSmooth*0.06})`;
  ctx.fillRect(0,0,W,H);

  const shakeX = analyser?(Math.random()-.5)*beat*14:0;
  const shakeY = analyser?(Math.random()-.5)*beat*14:0;
  const zoom = 1+beatSmooth*.055;
  ctx.save();
  ctx.translate(W/2+shakeX, H/2+shakeY);
  ctx.scale(zoom,zoom);
  ctx.translate(-W/2,-H/2);

  // Grid
  const vanishY = H*.5+beatSmooth*30;
  ctx.save();
  ctx.strokeStyle=`rgba(255,255,255,${0.09+beatSmooth*0.14})`; ctx.lineWidth=.5;
  for(let c=0;c<=GRID_COLS;c++){const tx=(c/GRID_COLS)*W; ctx.beginPath(); ctx.moveTo(tx,H); ctx.lineTo(W/2+(tx-W/2)*.05,vanishY); ctx.stroke();}
  for(let r=0;r<=GRID_ROWS;r++){const p=r/GRID_ROWS,py=vanishY+(H-vanishY)*p,sp=p; ctx.beginPath(); ctx.moveTo(W/2-(W/2)*sp,py); ctx.lineTo(W/2+(W/2)*sp,py); ctx.stroke();}
  ctx.restore();

  // Rings
  for(let r=0;r<7;r++){
    const rr=40+r*46+beatSmooth*(12+r*5);
    const rot=time*(r%2===0?.18:-.14)*(1+r*.08);
    const a=Math.min(.85,.18+(7-r)/7*.5+beatSmooth*.3);
    const g=Math.round(180-r*14+beatSmooth*50);
    ctx.save(); ctx.strokeStyle=`rgba(${g},${g},${g},${a})`; ctx.lineWidth=.6+beatSmooth*1.2;
    poly(W/2,H/2,3+r,rr,rot); ctx.stroke(); ctx.restore();
  }

  // Lissajous
  ctx.save(); ctx.beginPath();
  const lisA=2+Math.floor(midLevel*3), lisB=3+Math.floor(hiLevel*2), lisR=130+beatSmooth*60;
  for(let i=0;i<=300;i++){const t=(i/300)*Math.PI*2; const lx=W/2+Math.sin(lisA*t+time*.4)*lisR; const ly=H/2+Math.sin(lisB*t+time*.25)*lisR; i===0?ctx.moveTo(lx,ly):ctx.lineTo(lx,ly);}
  ctx.strokeStyle=`rgba(255,255,255,${(0.5+beatSmooth*.45)*.35})`; ctx.lineWidth=.8; ctx.stroke(); ctx.restore();

  // Floating shapes
  for(const fs of floatShapes){
    fs.x+=fs.vx*(1+beatSmooth*2.5); fs.y+=fs.vy*(1+beatSmooth*2.5); fs.rot+=fs.rotSpeed*(1+beatSmooth*3);
    if(fs.x<-60)fs.x=W+60; if(fs.x>W+60)fs.x=-60; if(fs.y<-60)fs.y=H+60; if(fs.y>H+60)fs.y=-60;
    const fr=fs.r*fs.depth+beatSmooth*fs.depth*22;
    const fg=Math.round(100+fs.depth*120+beatSmooth*60);
    ctx.save(); ctx.strokeStyle=`rgba(${fg},${fg},${fg},${0.12+fs.depth*.25+beatSmooth*.2})`; ctx.lineWidth=.5+fs.depth*.5;
    poly(fs.x,fs.y,fs.sides,fr,fs.rot); ctx.stroke(); ctx.restore();
  }

  // Particles
  for(const p of particles){
    const spd=1+beatSmooth*3.5; p.x+=p.vx*spd; p.y+=p.vy*spd; p.phase+=.02;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    const flicker=.4+.6*(.5+.5*Math.sin(p.phase+time*2));
    const ps=p.size*p.depth+beatSmooth*p.depth*2.5;
    const pg=Math.round(160+p.depth*90+beatSmooth*50);
    const pa=flicker*(.3+p.depth*.55+beatSmooth*.4);
    ctx.beginPath(); ctx.arc(p.x,p.y,ps,0,Math.PI*2);
    ctx.fillStyle=`rgba(${pg},${pg},${pg},${pa})`; ctx.fill();
    if(p.depth>.7&&flicker>.75){
      const cl=ps*2.5; ctx.save(); ctx.strokeStyle=`rgba(${pg},${pg},${pg},${pa*.5})`; ctx.lineWidth=.5;
      ctx.beginPath(); ctx.moveTo(p.x-cl,p.y); ctx.lineTo(p.x+cl,p.y); ctx.moveTo(p.x,p.y-cl); ctx.lineTo(p.x,p.y+cl); ctx.stroke(); ctx.restore();
    }
  }

  // Waveform
  ctx.save(); ctx.beginPath();
  const wW=W*.82, wX=(W-wW)/2;
  for(let i=0;i<timeData.length;i++){const x=wX+(i/(timeData.length-1))*wW; const y=H/2+((timeData[i]/128)-1)*(55+beatSmooth*90); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.strokeStyle=`rgba(255,255,255,${.5+beatSmooth*.5})`; ctx.lineWidth=1+beatSmooth*.8; ctx.stroke(); ctx.restore();

  // Beat burst
  if(beatSmooth>.35){
    ctx.save(); ctx.beginPath(); ctx.arc(W/2,H/2,beatSmooth*200,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,255,255,${(beatSmooth-.35)*.6})`; ctx.lineWidth=1.2; ctx.stroke(); ctx.restore();
  }

  ctx.restore();

  if(isPlaying&&audioCtx&&audioBuffer){
    const elapsed=audioCtx.currentTime-startTime;
    progressFill.style.width=Math.min(100,(elapsed/audioBuffer.duration)*100).toFixed(1)+'%';
  }
}
drawFrame();
</script>
