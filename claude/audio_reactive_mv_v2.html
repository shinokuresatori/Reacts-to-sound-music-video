
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#mv-container {
  width: 100%;
  background: #000;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}
canvas#mv { display: block; width: 100%; }
#controls {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: #111;
  border-top: 0.5px solid #333;
  flex-wrap: wrap;
}
#upload-btn {
  background: transparent;
  border: 0.5px solid #555;
  color: #ccc;
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
}
#upload-btn:hover { background: #222; border-color: #888; }
#file-input { display: none; }
#play-btn {
  background: transparent;
  border: 0.5px solid #555;
  color: #ccc;
  font-size: 13px;
  width: 32px; height: 32px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#play-btn:hover { background: #222; border-color: #aaa; }
#track-name {
  font-size: 12px;
  color: #777;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}
#progress-bar {
  width: 100%;
  height: 3px;
  background: #222;
  cursor: pointer;
  border-radius: 2px;
  order: -1;
  flex-basis: 100%;
}
#progress-fill {
  height: 100%;
  background: #fff;
  border-radius: 2px;
  width: 0%;
  pointer-events: none;
}
#no-audio-msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #444;
  font-size: 13px;
  text-align: center;
  pointer-events: none;
}
</style>

<div id="mv-container">
  <canvas id="mv"></canvas>
  <div id="no-audio-msg">WAV / MP3 / OGG ファイルを読み込んでください</div>
</div>
<div id="controls">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <button id="upload-btn">ファイルを開く</button>
  <input type="file" id="file-input" accept="audio/*">
  <button id="play-btn" disabled>▶</button>
  <span id="track-name">—</span>
</div>

<script>
const canvas = document.getElementById('mv');
const ctx = canvas.getContext('2d');
const uploadBtn = document.getElementById('upload-btn');
const fileInput = document.getElementById('file-input');
const playBtn = document.getElementById('play-btn');
const trackName = document.getElementById('track-name');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const noAudioMsg = document.getElementById('no-audio-msg');

const W = 800, H = 450;
canvas.width = W; canvas.height = H;

let audioCtx, analyser, source, audioBuffer;
let isPlaying = false, startTime = 0, pauseOffset = 0;

let beat = 0, beatSmooth = 0, bassLevel = 0, midLevel = 0, hiLevel = 0;
let time = 0;

// --- Particles ---
const PARTICLE_COUNT = 180;
const particles = [];
for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    size: 0.8 + Math.random() * 2.2,
    phase: Math.random() * Math.PI * 2,
    depth: 0.3 + Math.random() * 0.7,
  });
}

// --- Floating polygons ---
const FLOAT_SHAPES = 8;
const floatShapes = [];
for (let i = 0; i < FLOAT_SHAPES; i++) {
  floatShapes.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.25,
    vy: (Math.random() - 0.5) * 0.25,
    sides: 3 + Math.floor(Math.random() * 4),
    r: 18 + Math.random() * 28,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.012,
    depth: 0.3 + Math.random() * 0.7,
  });
}

// --- Grid lines ---
const GRID_COLS = 10, GRID_ROWS = 7;

function setupAudio(buffer) {
  if (audioCtx) audioCtx.close();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.82;
  analyser.connect(audioCtx.destination);
  audioBuffer = buffer;
}

function playFrom(offset) {
  if (!audioCtx || !audioBuffer) return;
  if (source) { try { source.stop(); } catch(e){} }
  source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(analyser);
  source.start(0, offset);
  startTime = audioCtx.currentTime - offset;
  source.onended = () => {
    if (isPlaying) { isPlaying = false; playBtn.textContent = '▶'; pauseOffset = 0; }
  };
}

uploadBtn.onclick = () => fileInput.click();
fileInput.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const arr = await file.arrayBuffer();
  const tmp = new (window.AudioContext || window.webkitAudioContext)();
  const buf = await tmp.decodeAudioData(arr);
  tmp.close();
  setupAudio(buf);
  trackName.textContent = file.name.replace(/\.[^.]+$/, '');
  noAudioMsg.style.display = 'none';
  playBtn.disabled = false;
  isPlaying = false; pauseOffset = 0;
  playBtn.textContent = '▶';
};

playBtn.onclick = () => {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!isPlaying) {
    playFrom(pauseOffset);
    isPlaying = true;
    playBtn.textContent = '⏸';
  } else {
    pauseOffset = audioCtx.currentTime - startTime;
    source.stop();
    isPlaying = false;
    playBtn.textContent = '▶';
  }
};

progressBar.onclick = (e) => {
  if (!audioBuffer) return;
  const rect = progressBar.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const seek = ratio * audioBuffer.duration;
  pauseOffset = seek;
  if (isPlaying) playFrom(seek);
};

const freqData = new Uint8Array(1024);
const timeData = new Uint8Array(2048);

function getEnergy(s, e) {
  let sum = 0;
  for (let i = s; i < e; i++) sum += freqData[i];
  return sum / ((e - s) * 255);
}

function poly(cx, cy, sides, r, rot) {
  ctx.beginPath();
  for (let i = 0; i <= sides; i++) {
    const a = (i / sides) * Math.PI * 2 + rot;
    const px = cx + Math.cos(a) * r;
    const py = cy + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
}

function drawFrame() {
  requestAnimationFrame(drawFrame);
  time += 0.016;

  if (analyser) {
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);
    bassLevel = getEnergy(0, 5);
    midLevel = getEnergy(5, 30);
    hiLevel = getEnergy(30, 100);
    beat = bassLevel;
    beatSmooth = beatSmooth * 0.88 + beat * 0.12;
  }

  // Trail
  ctx.fillStyle = `rgba(0,0,0,${0.14 + beatSmooth * 0.06})`;
  ctx.fillRect(0, 0, W, H);

  const shakeX = analyser ? (Math.random() - 0.5) * beat * 14 : 0;
  const shakeY = analyser ? (Math.random() - 0.5) * beat * 14 : 0;
  const zoom = 1 + beatSmooth * 0.055;

  ctx.save();
  ctx.translate(W/2 + shakeX, H/2 + shakeY);
  ctx.scale(zoom, zoom);
  ctx.translate(-W/2, -H/2);

  // --- 1. Perspective grid (distorts with bass) ---
  const vanishY = H * 0.5 + beatSmooth * 30;
  const gridAlpha = 0.09 + beatSmooth * 0.14;
  ctx.save();
  ctx.strokeStyle = `rgba(255,255,255,${gridAlpha})`;
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= GRID_COLS; c++) {
    const tx = (c / GRID_COLS) * W;
    ctx.beginPath();
    ctx.moveTo(tx, H);
    ctx.lineTo(W/2 + (tx - W/2) * 0.05, vanishY);
    ctx.stroke();
  }
  for (let r = 0; r <= GRID_ROWS; r++) {
    const progress = r / GRID_ROWS;
    const py = vanishY + (H - vanishY) * progress;
    const spread = progress;
    ctx.beginPath();
    ctx.moveTo(W/2 - (W/2) * spread, py);
    ctx.lineTo(W/2 + (W/2) * spread, py);
    ctx.stroke();
  }
  ctx.restore();

  // --- 2. Concentric rotating rings ---
  const RINGS = 7;
  for (let r = 0; r < RINGS; r++) {
    const baseR = 40 + r * 46;
    const ringR = baseR + beatSmooth * (12 + r * 5);
    const rot = time * (r % 2 === 0 ? 0.18 : -0.14) * (1 + r * 0.08);
    const sides = 3 + r;
    const a = Math.min(0.85, 0.18 + (RINGS - r) / RINGS * 0.5 + beatSmooth * 0.3);
    const g = Math.round(180 - r * 14 + beatSmooth * 50);
    ctx.save();
    ctx.strokeStyle = `rgba(${g},${g},${g},${a})`;
    ctx.lineWidth = 0.6 + beatSmooth * 1.2;
    poly(W/2, H/2, sides, ringR, rot);
    ctx.stroke();
    ctx.restore();
  }

  // --- 3. Lissajous / spiral tracer ---
  const lisAlpha = 0.5 + beatSmooth * 0.45;
  ctx.save();
  ctx.beginPath();
  const LIS_STEPS = 300;
  const lisA = 2 + Math.floor(midLevel * 3);
  const lisB = 3 + Math.floor(hiLevel * 2);
  const lisR = 130 + beatSmooth * 60;
  for (let i = 0; i <= LIS_STEPS; i++) {
    const t = (i / LIS_STEPS) * Math.PI * 2;
    const lx = W/2 + Math.sin(lisA * t + time * 0.4) * lisR;
    const ly = H/2 + Math.sin(lisB * t + time * 0.25) * lisR;
    i === 0 ? ctx.moveTo(lx, ly) : ctx.lineTo(lx, ly);
  }
  ctx.strokeStyle = `rgba(255,255,255,${lisAlpha * 0.35})`;
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.restore();

  // --- 4. Floating polygons ---
  for (const fs of floatShapes) {
    fs.x += fs.vx * (1 + beatSmooth * 2.5);
    fs.y += fs.vy * (1 + beatSmooth * 2.5);
    fs.rot += fs.rotSpeed * (1 + beatSmooth * 3);
    if (fs.x < -60) fs.x = W + 60;
    if (fs.x > W + 60) fs.x = -60;
    if (fs.y < -60) fs.y = H + 60;
    if (fs.y > H + 60) fs.y = -60;
    const fr = fs.r * fs.depth + beatSmooth * fs.depth * 22;
    const fg = Math.round(100 + fs.depth * 120 + beatSmooth * 60);
    const fa = (0.12 + fs.depth * 0.25 + beatSmooth * 0.2);
    ctx.save();
    ctx.strokeStyle = `rgba(${fg},${fg},${fg},${fa})`;
    ctx.lineWidth = 0.5 + fs.depth * 0.5;
    poly(fs.x, fs.y, fs.sides, fr, fs.rot);
    ctx.stroke();
    ctx.restore();
  }

  // --- 5. Particles ---
  for (const p of particles) {
    const speed = 1 + beatSmooth * 3.5;
    p.x += p.vx * speed;
    p.y += p.vy * speed;
    p.phase += 0.02;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
    const flicker = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(p.phase + time * 2));
    const pSize = p.size * p.depth + beatSmooth * p.depth * 2.5;
    const pg = Math.round(160 + p.depth * 90 + beatSmooth * 50);
    const pa = flicker * (0.3 + p.depth * 0.55 + beatSmooth * 0.4);
    ctx.beginPath();
    ctx.arc(p.x, p.y, pSize, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${pg},${pg},${pg},${pa})`;
    ctx.fill();
    // tiny cross on brighter particles
    if (p.depth > 0.7 && flicker > 0.75) {
      const cl = pSize * 2.5;
      ctx.save();
      ctx.strokeStyle = `rgba(${pg},${pg},${pg},${pa * 0.5})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(p.x - cl, p.y); ctx.lineTo(p.x + cl, p.y);
      ctx.moveTo(p.x, p.y - cl); ctx.lineTo(p.x, p.y + cl);
      ctx.stroke();
      ctx.restore();
    }
  }

  // --- 6. Waveform ---
  const waveLen = timeData.length;
  const waveW = W * 0.82;
  const waveX0 = (W - waveW) / 2;
  ctx.save();
  ctx.beginPath();
  for (let i = 0; i < waveLen; i++) {
    const x = waveX0 + (i / (waveLen - 1)) * waveW;
    const norm = (timeData[i] / 128) - 1;
    const amp = 55 + beatSmooth * 90;
    const y = H/2 + norm * amp;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = `rgba(255,255,255,${0.5 + beatSmooth * 0.5})`;
  ctx.lineWidth = 1.0 + beatSmooth * 0.8;
  ctx.stroke();
  ctx.restore();

  // --- 7. Center burst on strong beats ---
  if (beatSmooth > 0.35) {
    const burstR = beatSmooth * 200;
    ctx.save();
    ctx.beginPath();
    ctx.arc(W/2, H/2, burstR, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${(beatSmooth - 0.35) * 0.6})`;
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();

  if (isPlaying && audioCtx && audioBuffer) {
    const elapsed = audioCtx.currentTime - startTime;
    progressFill.style.width = Math.min(100, (elapsed / audioBuffer.duration) * 100).toFixed(1) + '%';
  }
}

drawFrame();
</script>
